<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdAnalyzer AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Smooth theme transitions */
      html {
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      /* Custom scrollbar for dark mode */
      .dark ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .dark ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
      /* Ant Design Popover Dark Mode Customization */
      .dark .ant-popover {
        color-scheme: dark;
      }
      .dark .ant-popover-inner {
        background-color: #1e293b;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
      }
      .dark .ant-popover-title {
        color: #f1f5f9;
        border-bottom-color: #475569;
      }
      .dark .ant-popover-inner-content {
        color: #e2e8f0;
      }
      .dark .ant-popover-arrow::before,
      .dark .ant-popover-arrow::after {
        background: #1e293b;
      }
    </style>
</head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 antialiased transition-colors">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
