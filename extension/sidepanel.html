<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketium Review</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="eye-ai-review.svg" alt="Rocketium Review" class="brand-logo" />
          <h1>Rocketium Review</h1>
        </div>
        <div class="topbar-actions">
          <button id="settings-toggle" class="ghost" title="Settings" aria-label="Settings">⚙</button>
          <button id="refresh-tab" class="secondary" title="Refresh" aria-label="Refresh">↻</button>
        </div>
      </header>

      <section class="settings" id="settings-panel" hidden>
        <label for="app-base-url">App Base URL</label>
        <div class="settings-row">
          <input
            id="app-base-url"
            type="text"
            placeholder="http://localhost:3000"
          />
          <button id="save-base-url" class="primary">Save</button>
        </div>
        <p class="hint">
          Point this to the deployed app or your local Vite server.
        </p>

        <div class="settings-group">
          <label for="rocketium-user-id">Rocketium User ID</label>
          <input
            id="rocketium-user-id"
            type="text"
            placeholder="Optional manual override"
          />
        </div>

        <div class="settings-group">
          <label for="rocketium-session-id">Rocketium Session ID</label>
          <input
            id="rocketium-session-id"
            type="text"
            placeholder="Optional manual override"
          />
        </div>

        <p class="hint">
          Leave these blank to use the active Rocketium tab automatically. Fill them only if you want to override.
        </p>
        <p id="identity-status" class="hint status-pill">Not detected yet</p>
      </section>

      <iframe
        id="app-frame"
        title="Rocketium Review App"
        referrerpolicy="no-referrer"
      ></iframe>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
